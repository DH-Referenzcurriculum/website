{{ define "main" }}
  <section class="bg-white">
    <div class="mw8 center ph3 ph4-ns pv5 pv6-l">
      <div class="mb4">
        <a href="/ag-referenzcurriculum/" class="dark-blue no-underline fw6">← Zurück zur AG-Übersicht</a>
      </div>
      <div class="w-100 w-two-thirds-l">
        <div class="f6 fw6 tracked ttu dark-red mb3">Materialien</div>
        <h1 class="f2 f1-l near-black lh-title mt0 mb3">{{ .Title }}</h1>
        {{ with .Description }}
          <p class="f4 gray lh-copy measure-wide mt0 mb4">{{ . }}</p>
        {{ end }}
      </div>
    </div>
  </section>

  <section class="bg-near-white">
    <div class="mw8 center ph3 ph4-ns pv5">
      <div class="flex-l flex-wrap nl3 nr3">
        {{ range .Params.resources }}
          <div class="w-100 w-50-l pa3">
            <article class="h-100 bg-white br3 pa4 shadow-4 flex flex-column justify-between">
              <div>
                <div class="f6 tracked ttu mid-gray mb2">{{ .type }} · {{ .year }}</div>
                <h2 class="f3 near-black mt0 mb3">{{ .title }}</h2>
                <p class="gray lh-copy">{{ .summary }}</p>
              </div>
              <div class="mt3">
                <a href="{{ .url }}" class="dib mr2 mb2 ph3 pv2 br2 no-underline white bg-dark-blue hover-bg-navy">{{ .actionLabel }}</a>
              </div>
            </article>
          </div>
        {{ end }}
      </div>
    </div>
  </section>

  <section class="bg-white">
    <div class="mw8 center ph3 ph4-ns pv5">
      <div class="bg-washed-blue br3 pa4 pa5-l">
        <div class="f6 fw6 tracked ttu dark-red mb2">Hinweis</div>
        <div class="f5 gray lh-copy nested-links">
          {{ .Content }}
        </div>
      </div>
    </div>
  </section>
{{ end }}
